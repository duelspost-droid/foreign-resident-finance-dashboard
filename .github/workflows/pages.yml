name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 16 * * *"   # 01:00 KST (16:00 UTC)

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      DATA_GO_KR_SERVICE_KEY: ${{ secrets.DATA_GO_KR_SERVICE_KEY }}
      KOSIS_API_KEY: ${{ secrets.KOSIS_API_KEY }}
      ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
      SEOUL_OPENAPI_KEY: ${{ secrets.SEOUL_OPENAPI_KEY }}
      HIBP_API_KEY: ${{ secrets.HIBP_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch and build data
        # data:ci = fetch + sync_candidates + build_real_data only.
        # (The full typecheck/build that data:all also runs is redundant here —
        #  the dedicated "Build static site" step below builds once.)
        timeout-minutes: 15
        continue-on-error: true
        run: npm run data:ci

      - name: Commit generated data if changed
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "Update daily public data"
          file_pattern: >-
            lib/data/generated/realData.ts
            lib/data/generated/dataLineage.ts
            lib/data/generated/genericData.ts
            lib/data/generated/breachMonitor.ts
            data/catalog/latest_fetch_catalog.json
            data/registry/approved_candidates.json
            data/registry/pending_candidates.json
            data/security/latest_breach_scan.json
            data/security/history/*.json
            data/raw/*.csv

      - name: Load Supabase data
        if: ${{ env.SUPABASE_URL != '' && env.SUPABASE_SERVICE_ROLE_KEY != '' }}
        run: npm run supabase:load

      - name: Build static site
        env:
          NEXT_OUTPUT: export
          # 관리자 승인 페이지(브라우저)용. anon 키만 노출(service_role 금지).
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: npm run pages:build

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
